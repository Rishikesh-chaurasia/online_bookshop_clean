{% extends 'userbase.html' %}
{% load static %}
{% block user %}

<div class="container min-vh-100 d-flex justify-content-center align-items-center">

    <div class="text-center p-4 shadow-lg rounded-4 bg-white" style="max-width:450px; width:100%;">

        <!-- ANIMATION -->
        <div class="checkmark-circle mx-auto mb-3">
            <div class="checkmark"></div>
        </div>

        <!-- TITLE -->
        <h2 class="fw-bold text-success">Payment Successful 🎉</h2>

        <p class="text-muted mb-4">
            Your order has been placed successfully.
        </p>

        <!-- BUTTONS -->
        <a href="{% url 'order' %}" class="btn btn-primary rounded-pill w-100 mb-2">
            View My Orders
        </a>

        <a href="{% url 'index' %}" class="btn btn-outline-success rounded-pill w-100">
            Continue Shopping
        </a>

    </div>

</div>

<!-- STYLE -->
<style>
.checkmark-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: #4CAF50;
    position: relative;
    animation: pop 0.4s ease-out;
}

/* check mark */
.checkmark {
    width: 55px;
    height: 28px;
    border-left: 5px solid #fff;
    border-bottom: 5px solid #fff;
    transform: rotate(-45deg);
    position: absolute;
    top: 38px;
    left: 28px;
    animation: draw 0.6s ease forwards;
}

/* animations */
@keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

@keyframes draw {
    0% {
        opacity: 0;
        transform: rotate(-45deg) scale(0);
    }
    100% {
        opacity: 1;
        transform: rotate(-45deg) scale(1);
    }
}
</style>

{% endblock %}
