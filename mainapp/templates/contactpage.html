{% extends 'base.html' %}
{% load static %}

{% block main %}

<div class="container py-5">

    <div class="row shadow-lg rounded-4 overflow-hidden contact-section">

        <!-- ================= LEFT SIDE ================= -->
        <div class="col-lg-5 bg-dark text-white p-5 d-flex flex-column justify-content-center">

            <button class="btn btn-primary rounded-pill px-4 mb-4 w-auto">
                Contact Us
            </button>

            <h1 class="fw-bold mb-4">
                Let's Get In Touch 📞
            </h1>

            <p class="text-light mb-4">

                Have questions about books, orders, or delivery?
                Feel free to contact us anytime.

            </p>

            <!-- CONTACT INFO -->
            <div class="mt-4">

                <p>
                    <i class="bi bi-geo-alt-fill me-2"></i>
                    Lucknow, India
                </p>

                <p>
                    <i class="bi bi-envelope-fill me-2"></i>
                    info@example.com
                </p>

                <p>
                    <i class="bi bi-telephone-fill me-2"></i>
                    +91 9876543210
                </p>

            </div>

        </div>

        <!-- ================= RIGHT SIDE FORM ================= -->
        <div class="col-lg-7 bg-white p-5">

            <form method="POST">

                {% csrf_token %}

                <!-- NAME -->
                <div class="mb-3">

                    <label for="name" class="form-label fw-semibold">
                        Your Name
                    </label>

                    <input type="text"
                           name="name"
                           id="name"
                           class="form-control form-control-lg rounded-pill"
                           placeholder="Enter your name"
                           required>

                </div>

                <!-- EMAIL -->
                <div class="mb-3">

                    <label for="email" class="form-label fw-semibold">
                        Your Email
                    </label>

                    <input type="email"
                           name="email"
                           id="email"
                           class="form-control form-control-lg rounded-pill"
                           placeholder="Enter your email"
                           required>

                </div>

                <!-- PHONE -->
                <div class="mb-3">

                    <label for="number" class="form-label fw-semibold">
                        Contact Number
                    </label>

                    <input type="number"
                           name="number"
                           id="number"
                           class="form-control form-control-lg rounded-pill"
                           placeholder="Enter phone number"
                           required>

                </div>

                <!-- SUBJECT -->
                <div class="mb-3">

                    <label for="subject" class="form-label fw-semibold">
                        Subject
                    </label>

                    <input type="text"
                           name="subject"
                           id="subject"
                           class="form-control form-control-lg rounded-pill"
                           placeholder="Enter subject"
                           required>

                </div>

                <!-- MESSAGE -->
                <div class="mb-4">

                    <label for="message" class="form-label fw-semibold">
                        Message
                    </label>

                    <textarea name="message"
                              id="message"
                              rows="5"
                              class="form-control rounded-4"
                              placeholder="Write your message..."
                              required></textarea>

                </div>

                <!-- BUTTON -->
                <button class="btn btn-primary btn-lg w-100 rounded-pill"
                        type="submit">

                    Send Message

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
