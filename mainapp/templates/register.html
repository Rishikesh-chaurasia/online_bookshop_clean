{% extends 'base.html' %}
{% load static %}

{% block main %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8">

            <!-- CARD -->
            <div class="card shadow-lg border-0 rounded-4 p-4 register-card">

                <!-- HEADING -->
                <div class="text-center mb-4">

                    <h1 class="fw-bold text-primary">
                        Create Account
                    </h1>

                    <p class="text-muted">
                        Register to continue shopping 📚
                    </p>

                </div>

                <!-- FORM -->
                <form method="post">

                    {% csrf_token %}

                    <!-- NAME -->
                    <div class="mb-3">

                        <label for="n" class="form-label fw-semibold">
                            Full Name
                        </label>

                        <input type="text"
                               name="name"
                               id="n"
                               class="form-control form-control-lg rounded-pill"
                               placeholder="Enter your name"
                               required>

                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label for="em" class="form-label fw-semibold">
                            Email Address
                        </label>

                        <input type="email"
                               name="email"
                               id="em"
                               class="form-control form-control-lg rounded-pill"
                               placeholder="Enter your email"
                               required>

                    </div>

                    <!-- CONTACT -->
                    <div class="mb-3">

                        <label for="cn" class="form-label fw-semibold">
                            Contact Number
                        </label>

                        <input type="number"
                               name="contactno"
                               id="cn"
                               class="form-control form-control-lg rounded-pill"
                               placeholder="Enter mobile number"
                               required>

                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">

                        <label for="p" class="form-label fw-semibold">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               id="p"
                               class="form-control form-control-lg rounded-pill"
                               placeholder="Enter password"
                               required>

                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div class="mb-3">

                        <label for="cp" class="form-label fw-semibold">
                            Confirm Password
                        </label>

                        <input type="password"
                               name="cpassword"
                               id="cp"
                               class="form-control form-control-lg rounded-pill"
                               placeholder="Confirm password"
                               required>

                    </div>

                    <!-- TERMS -->
                    <div class="form-check mb-4">

                        <input class="form-check-input"
                               type="checkbox"
                               id="terms"
                               required>

                        <label class="form-check-label" for="terms">

                            I agree to the
                            <a href="#" class="text-decoration-none">
                                Terms & Conditions
                            </a>

                        </label>

                    </div>

                    <!-- BUTTON -->
                    <div class="d-grid">

                        <button type="submit"
                                class="btn btn-success btn-lg rounded-pill">

                            Register

                        </button>

                    </div>

                    <!-- LOGIN -->
                    <div class="text-center mt-4">

                        Already have an account?

                        <a href="{% url 'login' %}"
                           class="text-decoration-none fw-bold">

                            Login Now

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
