{% extends 'adminbase.html' %}
{% block admin %}

<!-- PAGE WRAPPER BACKGROUND -->
<div class="container-fluid bg-light py-4 rounded-4">

    <!-- PAGE TITLE -->
    <div class="row mb-4">
        <div class="col-12">
            <h3 class="fw-bold text-dark">Admin Dashboard</h3>
            <p class="text-muted mb-0">Overview of your application</p>
        </div>
    </div>

    <!-- DASHBOARD CARDS -->
    <div class="row g-4">

        <!-- TOTAL USERS -->
        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-4 bg-primary bg-opacity-10">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <span class="badge bg-primary p-3 rounded-circle">
                            <i class="ti ti-user fs-4"></i>
                        </span>
                    </div>
                    <h6 class="text-muted">Total Users</h6>
                    <h3 class="fw-bold text-primary">{{ user_count }}</h3>
                </div>
            </div>
        </div>

        <!-- TOTAL BOOKS -->
        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-4 bg-success bg-opacity-10">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <span class="badge bg-success p-3 rounded-circle">
                            <i class="ti ti-book fs-4"></i>
                        </span>
                    </div>
                    <h6 class="text-muted">Total Books</h6>
                    <h3 class="fw-bold text-success">{{ book_count }}</h3>
                </div>
            </div>
        </div>

        <!-- TOTAL REVENUE -->
        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-4 bg-warning bg-opacity-10">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <span class="badge bg-warning p-3 rounded-circle">
                            <i class="ti ti-currency-rupee fs-4"></i>
                        </span>
                    </div>
                    <h6 class="text-muted">Total Revenue</h6>
                    <h3 class="fw-bold text-warning">₹ {{ total_revenue }}</h3>
                </div>
            </div>
        </div>

        <!-- TOTAL ORDERS -->
        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 shadow-sm rounded-4 bg-info bg-opacity-10">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <span class="badge bg-info p-3 rounded-circle">
                            <i class="ti ti-shopping-cart fs-4"></i>
                        </span>
                    </div>
                    <h6 class="text-muted">Total Orders</h6>
                    <h3 class="fw-bold text-info">{{ order_count }}</h3>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
