{% extends 'adminbase.html' %}
{% block admin %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5 col-md-7">

            <!-- CARD -->
            <div class="card border-0 shadow-lg rounded-4">

                <!-- HEADER -->
                <div class="bg-primary text-white text-center py-4 rounded-top-4">

                    <h3 class="fw-bold mb-1">🔐 Change Password</h3>
                    <p class="mb-0">Update your admin account password</p>

                </div>

                <!-- BODY -->
                <div class="card-body p-4">

                    <form method="post">
                        {% csrf_token %}

                        <!-- OLD PASSWORD -->
                        <div class="mb-3">

                            <label class="form-label fw-semibold">Old Password</label>

                            <input type="password"
                                   name="oldpassword"
                                   class="form-control rounded-pill"
                                   placeholder="Enter old password"
                                   required>

                        </div>

                        <!-- NEW PASSWORD -->
                        <div class="mb-3">

                            <label class="form-label fw-semibold">New Password</label>

                            <input type="password"
                                   name="newpassword"
                                   class="form-control rounded-pill"
                                   placeholder="Enter new password"
                                   required>

                        </div>

                        <!-- CONFIRM PASSWORD -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">Confirm Password</label>

                            <input type="password"
                                   name="confirmpassword"
                                   class="form-control rounded-pill"
                                   placeholder="Confirm new password"
                                   required>

                        </div>

                        <!-- BUTTON -->
                        <button type="submit"
                                class="btn btn-primary w-100 rounded-pill py-2 fw-bold">

                            Update Password

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
